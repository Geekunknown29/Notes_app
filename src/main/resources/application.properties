spring.application.name=Notes_Manager

# Database Connection - reads from environment variables (set these in Railway)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/notes_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Arpit.2956}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring Security (reads from env vars in production)
spring.security.user.name=${APP_USERNAME:user}
spring.security.user.password=${APP_PASSWORD:1234}