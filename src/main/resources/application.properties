spring.application.name=Notes_Manager

# Database Connection - using Railway MySQL variables directly
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring Security (reads from env vars)
spring.security.user.name=${APP_USERNAME:user}
spring.security.user.password=${APP_PASSWORD:1234}