<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - Notes Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            color: black;
            /* This points to the image in your static folder */
            background-image: url('/user_login.png');
            background-color: black;
            /* Fills the background in black if the image doesn't cover it */
            background-size: 90%;
            /* Keeps original aspect ratio but makes it a bit smaller than the screen */
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.25);
            /* Ultra-transparent white */
            backdrop-filter: blur(5px);
            /* Frosted glass effect */
            -webkit-backdrop-filter: blur(5px);
            /* Safari support */
            border: 1px solid rgba(255, 255, 255, 0.4);
            /* Glossy frosted edge */
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            /* Deep drop shadow for depth */
            width: 100%;
            max-width: 400px;
        }

        .login-card h3,
        .login-card p {
            color: #212529;
            /* Sleek dark text (Bootstrap's default dark) */
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
            /* Soft white shadow to help it stand out against the glass */
        }
    </style>
</head>

<body>
    <div class="login-card text-center">
        <h3>Welcome Back</h3>
        <p>Please log in to your Notes</p>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>

            <div th:if="${param.error}" class="text-danger mt-2">
                Invalid username or password.
            </div>
        </form>
    </div>
</body>

</html>
